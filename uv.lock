version = 1
requires-python = ">=3.11"

[[package]]
name = "financial-data-cleaning-env"
version = "1.0.0"
source = { editable = "." }
dependencies = [
  { name = "pandas" },
  { name = "pydantic" },
  { name = "openai" },
  { name = "flask" },
  { name = "openenv-core" },
]

[[package]]
name = "flask"
version = "3.0.0"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "pandas"
version = "2.2.0"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "pydantic"
version = "2.6.0"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "openai"
version = "1.14.0"
source = { registry = "https://pypi.org/simple" }

[[package]]
name = "openenv-core"
version = "0.2.0"
source = { registry = "https://pypi.org/simple" }
